<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All-in-One Image Slider</title>
    <style>
        /* CSS STYLING */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Container for the slider */
        .slider-container {
            max-width: 900px;
            width: 95%;
            position: relative;
            margin: auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        /* Hide slides by default */
        .slide {
            display: none;
            position: relative;
        }

        img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }

        /* Navigation Buttons */
        .prev, .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            padding: 20px;
            color: white;
            font-weight: bold;
            font-size: 24px;
            transition: 0.4s ease;
            user-select: none;
            background-color: rgba(0,0,0,0.2);
            text-decoration: none;
        }

        .next { right: 0; border-radius: 8px 0 0 8px; }
        .prev { left: 0; border-radius: 0 8px 8px 0; }

        .prev:hover, .next:hover {
            background-color: rgba(0,0,0,0.7);
            color: #ffde59;
        }

        /* Caption Text */
        .caption {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 14px;
            backdrop-filter: blur(5px);
        }

        /* Dots Container */
        .dot-container {
            text-align: center;
            position: absolute;
            bottom: 15px;
            width: 100%;
        }

        .dot {
            cursor: pointer;
            height: 10px;
            width: 10px;
            margin: 0 5px;
            background-color: rgba(255,255,255,0.4);
            border-radius: 50%;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .active, .dot:hover {
            background-color: #fff;
            width: 25px;
            border-radius: 10px;
        }

        /* Smooth Fade Animation */
        .fade {
            animation: fadeEffect 0.8s;
        }

        @keyframes fadeEffect {
            from { opacity: 0.5; filter: grayscale(100%); }
            to { opacity: 1; filter: grayscale(0%); }
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            .prev, .next { padding: 12px; font-size: 18px; }
            .caption { font-size: 12px; bottom: 40px; }
        }
    </style>
</head>
<body>

    <div class="slider-container">
        <div class="slide fade">
            <img src="https://picsum.photos/id/1015/1000/500" alt="River">
            <div class="caption">01 / 05 — Serene River Valley</div>
        </div>

        <div class="slide fade">
            <img src="https://picsum.photos/id/1016/1000/500" alt="Mountain">
            <div class="caption">02 / 05 — Misty Peaks</div>
        </div>

        <div class="slide fade">
            <img src="https://picsum.photos/id/1018/1000/500" alt="Road">
            <div class="caption">03 / 05 — The Open Road</div>
        </div>

        <div class="slide fade">
            <img src="https://picsum.photos/id/1019/1000/500" alt="Lake">
            <div class="caption">04 / 05 — Mirror Lake</div>
        </div>

        <div class="slide fade">
            <img src="https://picsum.photos/id/1039/1000/500" alt="Forest">
            <div class="caption">05 / 05 — Deep Woods</div>
        </div>

        <a class="prev" onclick="moveSlide(-1)">&#10094;</a>
        <a class="next" onclick="moveSlide(1)">&#10095;</a>

        <div class="dot-container">
            <span class="dot" onclick="jumpToSlide(1)"></span>
            <span class="dot" onclick="jumpToSlide(2)"></span>
            <span class="dot" onclick="jumpToSlide(3)"></span>
            <span class="dot" onclick="jumpToSlide(4)"></span>
            <span class="dot" onclick="jumpToSlide(5)"></span>
        </div>
    </div>

    <script>
        // JAVASCRIPT LOGIC
        let slideIndex = 1;
        let slideTimer;

        // Display initial slide
        showSlides(slideIndex);
        // Start automatic slideshow
        autoPlay();

        // Next/Prev button logic
        function moveSlide(n) {
            showSlides(slideIndex += n);
            resetTimer();
        }

        // Dot navigation logic
        function jumpToSlide(n) {
            showSlides(slideIndex = n);
            resetTimer();
        }

        function showSlides(n) {
            let i;
            let slides = document.getElementsByClassName("slide");
            let dots = document.getElementsByClassName("dot");

            // Loop logic: If index exceeds length, go back to 1
            if (n > slides.length) { slideIndex = 1 }
            // Loop logic: If index is less than 1, go to last
            if (n < 1) { slideIndex = slides.length }

            // Hide all slides
            for (i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }

            // Remove active status from all dots
            for (i = 0; i < dots.length; i++) {
                dots[i].className = dots[i].className.replace(" active", "");
            }

            // Show current slide and activate corresponding dot
            slides[slideIndex - 1].style.display = "block";
            dots[slideIndex - 1].className += " active";
        }

        // Automatic transition function
        function autoPlay() {
            slideTimer = setInterval(() => {
                moveSlide(1);
            }, 4000); // Transitions every 4 seconds
        }

        // Reset timer when user interacts to prevent double skipping
        function resetTimer() {
            clearInterval(slideTimer);
            autoPlay();
        }
    </script>
</body>
</html>
